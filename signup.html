<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Toyza · Join the Playful Family | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/jpeg" href="images/toy (1).jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fffaf2 0%, #ffffff 100%);
      color: #1a1a1a;
      transition: background-color 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* Dark Mode */
    body.dark-mode {
      background: #0f1217;
    }

    body.dark-mode .signup-card {
      background-color: #1a1e26;
      border-color: #2c313c;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
    }
    body.dark-mode .signup-header h2 { color: #f0f3f8; }
    body.dark-mode .signup-header p { color: #a8b3cf; }
    body.dark-mode .input-group label { color: #cbd5e6; }
    body.dark-mode .input-group input {
      background-color: #0f1219;
      border-color: #2c313c;
      color: #edf2f7;
    }
    body.dark-mode .input-group input:focus {
      border-color: #f3ac00;
      box-shadow: 0 0 0 3px rgba(243,172,0,0.25);
    }
    body.dark-mode .divider span { background-color: #1a1e26; color: #8e9aaf; }
    body.dark-mode .divider::before { background-color: #2c313c; }
    body.dark-mode .social-signup-btn {
      background-color: #0f1219;
      border-color: #2c313c;
      color: #e2e8f0;
    }
    body.dark-mode .social-signup-btn:hover {
      background-color: #1e2a3a;
      border-color: #f3ac00;
    }
    body.dark-mode .login-prompt { color: #a8b3cf; }
    body.dark-mode .terms-text { color: #8e9aaf; }
    body.dark-mode .terms-text a { color: #f3ac00; }

    /* Top-right controls container - perfectly positioned on all screens */
    .global-controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.6rem;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      padding: 0.4rem 0.9rem;
      border-radius: 60px;
      border: 1px solid rgba(243, 172, 0, 0.4);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      transition: all 0.2s;
    }
    body.dark-mode .global-controls {
      background: rgba(26, 30, 38, 0.9);
      border-color: rgba(243, 172, 0, 0.5);
      backdrop-filter: blur(16px);
    }
    .global-btn {
      background: transparent;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      color: #2c3e2f;
      padding: 0.35rem 0.85rem;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .global-btn i { font-size: 0.85rem; }
    .global-btn:hover {
      background-color: rgba(243, 172, 0, 0.2);
      color: #f3ac00;
      transform: translateY(-1px);
    }
    body.dark-mode .global-btn {
      color: #e2e8f0;
    }
    body.dark-mode .global-btn:hover {
      background-color: rgba(243, 172, 0, 0.25);
      color: #f3ac00;
    }

    /* Signup Container */
    .signup-container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 0.5rem 0;
    }

    /* Premium Logo inside card */
    .brand-logo {
      text-align: center;
      margin-bottom: 1rem;
    }
    .brand-logo a {
      text-decoration: none;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #f3ac00;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .brand-logo span {
      font-weight: 400;
      color: #4a6a3b;
    }
    body.dark-mode .brand-logo span { color: #7da064; }

    /* Signup Card — fully responsive, no overflow, smooth edges */
    .signup-card {
      background: #ffffff;
      border-radius: 40px;
      border: 1px solid #f0e4d8;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08);
      padding: 2rem 1.8rem 2.5rem;
      transition: all 0.2s;
      width: 100%;
    }
    .signup-header {
      text-align: center;
      margin-bottom: 1.6rem;
    }
    .signup-header h2 {
      font-size: 1.85rem;
      font-weight: 700;
      color: #2c3e2f;
      letter-spacing: -0.3px;
    }
    .signup-header p {
      color: #6b7c6b;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1.2rem;
    }
    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.45rem;
      color: #2c3e2f;
    }
    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 30px;
      border: 1px solid #e2dcd2;
      background: #fefefc;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.2s;
      outline: none;
    }
    .input-group input:focus {
      border-color: #f3ac00;
      box-shadow: 0 0 0 3px rgba(243,172,0,0.2);
    }
    .name-row {
      display: flex;
      gap: 1rem;
    }
    .name-row .input-group {
      flex: 1;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 1.2rem 0 1rem;
      flex-wrap: wrap;
    }
    .checkbox-group input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #f3ac00;
      flex-shrink: 0;
    }
    .checkbox-group label {
      font-size: 0.8rem;
      color: #5a6e5a;
      cursor: pointer;
      font-weight: 500;
      line-height: 1.4;
    }
    .terms-text {
      font-size: 0.72rem;
      color: #7a8a7a;
      text-align: center;
      margin-top: 0.9rem;
    }
    .terms-text a {
      color: #f3ac00;
      text-decoration: none;
      font-weight: 600;
    }
    .terms-text a:hover { text-decoration: underline; }
    .signup-btn {
      width: 100%;
      background: #f3ac00;
      border: none;
      padding: 0.9rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      color: #2c3e2f;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(243,172,0,0.2);
      margin-top: 0.5rem;
    }
    .signup-btn:active {
      transform: scale(0.98);
    }
    .signup-btn:hover {
      background: #e09d00;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(243,172,0,0.25);
    }
    .divider {
      text-align: center;
      margin: 1.6rem 0 1.4rem;
      position: relative;
    }
    .divider span {
      background: #ffffff;
      padding: 0 1rem;
      font-size: 0.8rem;
      color: #8b9a8b;
      position: relative;
      z-index: 1;
    }
    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e2dcd2;
    }
    .social-signup {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .social-signup-btn {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #e2dcd2;
      padding: 0.7rem 0.5rem;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      color: #2c3e2f;
    }
    .social-signup-btn i { font-size: 1.1rem; }
    .social-signup-btn:active {
      transform: scale(0.97);
    }
    .social-signup-btn:hover {
      background: #fef5e0;
      border-color: #f3ac00;
      transform: translateY(-2px);
    }
    .login-prompt {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: #5a6e5a;
    }
    .login-prompt a {
      color: #f3ac00;
      font-weight: 700;
      text-decoration: none;
    }
    .login-prompt a:hover { text-decoration: underline; }

    /* RTL Support */
    [dir="rtl"] .global-controls {
      right: auto;
      left: 1rem;
    }
    [dir="rtl"] .signup-card { text-align: right; }
    [dir="rtl"] .input-group input { text-align: right; }
    [dir="rtl"] .name-row { flex-direction: row-reverse; }
    [dir="rtl"] .social-signup-btn { flex-direction: row-reverse; }
    [dir="rtl"] .checkbox-group { flex-direction: row-reverse; justify-content: flex-end; }
    [dir="rtl"] .brand-logo a { flex-direction: row; }

    /* 📱 ULTRA RESPONSIVE: Perfect on every mobile size (320px to 480px) */
    @media (max-width: 560px) {
      body {
        padding: 0.75rem;
        align-items: flex-start;
        padding-top: 4.5rem;
      }
      .global-controls {
        top: 0.75rem;
        right: 0.75rem;
        padding: 0.3rem 0.7rem;
        gap: 0.4rem;
      }
      .global-btn {
        padding: 0.25rem 0.6rem;
        font-size: 0.7rem;
      }
      .global-btn i {
        font-size: 0.75rem;
      }
      .signup-card {
        padding: 1.5rem 1.25rem 2rem;
        border-radius: 32px;
      }
      .brand-logo a {
        font-size: 1.9rem;
      }
      .signup-header h2 {
        font-size: 1.55rem;
      }
      .signup-header p {
        font-size: 0.8rem;
      }
      .name-row {
        flex-direction: column;
        gap: 0;
      }
      .input-group {
        margin-bottom: 1rem;
      }
      .input-group input {
        padding: 0.75rem 0.9rem;
        font-size: 0.9rem;
      }
      .checkbox-group label {
        font-size: 0.75rem;
      }
      .signup-btn {
        padding: 0.8rem;
        font-size: 0.95rem;
      }
      .social-signup {
        gap: 0.7rem;
      }
      .social-signup-btn {
        padding: 0.6rem 0.4rem;
        font-size: 0.8rem;
        min-width: 100px;
      }
      .login-prompt {
        margin-top: 1.5rem;
        font-size: 0.8rem;
      }
      .terms-text {
        font-size: 0.68rem;
      }
      [dir="rtl"] .global-controls {
        right: auto;
        left: 0.75rem;
      }
    }

    /* Extra small devices (<= 380px) */
    @media (max-width: 380px) {
      .signup-card {
        padding: 1.2rem 1rem 1.8rem;
      }
      .brand-logo a {
        font-size: 1.7rem;
      }
      .signup-header h2 {
        font-size: 1.4rem;
      }
      .global-btn span {
        display: inline-block;
      }
      .social-signup-btn {
        font-size: 0.7rem;
        gap: 6px;
      }
      .social-signup-btn i {
        font-size: 0.9rem;
      }
      .input-group input {
        padding: 0.7rem 0.85rem;
      }
    }

    /* Landscape mode on small phones: improve spacing */
    @media (max-height: 600px) and (orientation: landscape) {
      body {
        padding: 1rem;
        align-items: center;
      }
      .signup-card {
        padding: 1rem 1.5rem 1.2rem;
      }
      .signup-header {
        margin-bottom: 0.8rem;
      }
      .input-group {
        margin-bottom: 0.7rem;
      }
      .checkbox-group {
        margin: 0.5rem 0;
      }
      .login-prompt {
        margin-top: 0.8rem;
      }
    }

    /* improve touch targets on mobile */
    @media (hover: none) and (pointer: coarse) {
      .signup-btn, .social-signup-btn, .global-btn, .checkbox-group label, .input-group input {
        cursor: default;
      }
      .signup-btn:active {
        transform: scale(0.98);
      }
      .social-signup-btn:active {
        transform: scale(0.97);
      }
    }
  </style>
</head>
<body>

<!-- Top-right corner: Dark Mode + RTL toggle (responsive and accessible) -->
<div class="global-controls">
  <button class="global-btn" id="globalDarkToggle" aria-label="Dark mode toggle"><i class="fas fa-moon"></i> <span>Dark</span></button>
  <button class="global-btn" id="globalRtlToggle" aria-label="RTL toggle"> <span>RTL</span></button>
</div>

<div class="signup-container">
  <div class="signup-card">
    <!-- Logo inside card -->
    <div class="brand-logo">
      <a href="index.html" aria-label="Toyza homepage">Toyza</a>
    </div>

    <div class="signup-header">
      <h2>Create an account ✨</h2>
      <p>Join the Toyza family & unlock playful rewards</p>
    </div>

    <form id="signupForm" novalidate>
      <div class="name-row">
        <div class="input-group">
          <label>First name</label>
          <input type="text" id="firstName" placeholder="Leo" autocomplete="given-name" required>
        </div>
        <div class="input-group">
          <label>Last name</label>
          <input type="text" id="lastName" placeholder="Toymaker" autocomplete="family-name" required>
        </div>
      </div>
      <div class="input-group">
        <label>Email address</label>
        <input type="email" id="signupEmail" placeholder="hello@toyza.com" autocomplete="email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create a strong password" autocomplete="new-password" required>
      </div>
      <div class="input-group">
        <label>Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="off" required>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="termsCheckbox" required>
        <label for="termsCheckbox">I agree to the <a href="#" id="termsLink" style="color:#f3ac00; text-decoration:none;">Terms of Service</a> and <a href="#" id="privacyLink" style="color:#f3ac00; text-decoration:none;">Privacy Policy</a></label>
      </div>
      
      <button type="submit" class="signup-btn"><i class="fas fa-gift"></i> Sign up for free</button>
    </form>

    <div class="divider"><span>or sign up with</span></div>
    <div class="social-signup">
      <button class="social-signup-btn" id="googleSignup" aria-label="Sign up with Google"><i class="fab fa-google"></i> Google</button>
      <button class="social-signup-btn" id="appleSignup" aria-label="Sign up with Apple"><i class="fab fa-apple"></i> Apple</button>
    </div>

    <div class="login-prompt">
      Already have an account? <a href="login.html" id="loginRedirect">Log in →</a>
    </div>
    <div class="terms-text">
      By joining, you agree to receive magical updates & offers.
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- DARK MODE (global controls at top-right) -----
    const globalDarkBtn = document.getElementById('globalDarkToggle');
    const applyDarkMode = (isDark) => {
      document.body.classList.toggle('dark-mode', isDark);
      localStorage.setItem('toyzaDarkMode', isDark);
      if (globalDarkBtn) {
        const icon = globalDarkBtn.querySelector('i');
        const span = globalDarkBtn.querySelector('span');
        if (isDark) {
          if (icon) icon.className = 'fas fa-sun';
          if (span) span.innerText = 'Light';
        } else {
          if (icon) icon.className = 'fas fa-moon';
          if (span) span.innerText = 'Dark';
        }
      }
    };
    const savedDark = localStorage.getItem('toyzaDarkMode') === 'true';
    applyDarkMode(savedDark);
    
    const toggleDark = () => {
      applyDarkMode(!document.body.classList.contains('dark-mode'));
    };
    if (globalDarkBtn) globalDarkBtn.addEventListener('click', toggleDark);

    // ----- RTL TOGGLE (top-right control) -----
    const globalRtlBtn = document.getElementById('globalRtlToggle');
    const applyRTL = (isRTL) => {
      document.documentElement.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
      localStorage.setItem('toyzaRTLMode', isRTL);
      if (globalRtlBtn) {
        const span = globalRtlBtn.querySelector('span');
        if (span) span.innerText = isRTL ? 'LTR' : 'RTL';
      }
    };
    const savedRTL = localStorage.getItem('toyzaRTLMode') === 'true';
    applyRTL(savedRTL);
    
    const toggleRTL = () => {
      const currentDir = document.documentElement.getAttribute('dir');
      const newRTL = currentDir !== 'rtl';
      applyRTL(newRTL);
    };
    if (globalRtlBtn) globalRtlBtn.addEventListener('click', toggleRTL);

    // ----- SIGNUP FORM HANDLER with improved validation + mobile friendly -----
    const signupForm = document.getElementById('signupForm');
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const termsCheckbox = document.getElementById('termsCheckbox');

    if (signupForm) {
      signupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const fName = firstName.value.trim();
        const lName = lastName.value.trim();
        const email = signupEmail.value.trim();
        const pass = signupPassword.value.trim();
        const confirm = confirmPassword.value.trim();
        
        if (!fName || !lName) {
          alert('✨ Please tell us your first and last name!');
          return;
        }
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!email || !emailRegex.test(email)) {
          alert('🔐 Please enter a valid email address (e.g., name@example.com).');
          return;
        }
        if (!pass) {
          alert('🔒 Create a password to protect your Toyza account.');
          return;
        }
        if (pass.length < 6) {
          alert('🎈 Password must be at least 6 characters long (let’s keep it safe!).');
          return;
        }
        if (pass !== confirm) {
          alert('❌ Passwords do not match. Please double-check!');
          return;
        }
        if (!termsCheckbox.checked) {
          alert('📜 Please agree to the Terms of Service and Privacy Policy to continue.');
          return;
        }
        
        // Successful signup simulation
        const displayName = fName.charAt(0).toUpperCase() + fName.slice(1).toLowerCase();
        alert(`🎉 Welcome to Toyza, ${displayName}! Your account has been created. 🧸\n\nA magical confirmation email was sent to ${email} (demo). Start exploring!`);
        
        // Optionally reset form after demo, but preserve name fields if desired? We reset fully.
        signupForm.reset();
      });
    }
    
    // Social signup demos with responsive feedback
    const googleSignup = document.getElementById('googleSignup');
    const appleSignup = document.getElementById('appleSignup');
    if (googleSignup) {
      googleSignup.addEventListener('click', () => {
        alert('🍃 Continue with Google — One step closer to playful discoveries! (Demo)');
      });
    }
    if (appleSignup) {
      appleSignup.addEventListener('click', () => {
        alert('🍎 Apple ID sign up — seamless & magical! (Demo experience)');
      });
    }
    
    // Terms & privacy links (demo)
    const termsLink = document.getElementById('termsLink');
    const privacyLink = document.getElementById('privacyLink');
    if (termsLink) {
      termsLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert('📖 Toyza Terms of Service: Play safe, be kind, and enjoy endless imagination. (Demo)');
      });
    }
    if (privacyLink) {
      privacyLink.addEventListener('click', (e) => {
        e.preventDefault();
        alert('🔒 Toyza Privacy Policy: We treasure your data like a favorite plush toy. (Demo)');
      });
    }
    
    // Enter key friendly submission
    const allInputs = document.querySelectorAll('.input-group input');
    allInputs.forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const submitEvent = new Event('submit', { cancelable: true, bubbles: true });
          signupForm?.dispatchEvent(submitEvent);
        }
      });
    });
    
    // Sync RTL button text after page load
    if (globalRtlBtn && document.documentElement.getAttribute('dir') === 'rtl') {
      const span = globalRtlBtn.querySelector('span');
      if (span) span.innerText = 'LTR';
    } else if (globalRtlBtn && document.documentElement.getAttribute('dir') !== 'rtl') {
      const span = globalRtlBtn.querySelector('span');
      if (span) span.innerText = 'RTL';
    }
  })();
</script>
</body>
</html>
